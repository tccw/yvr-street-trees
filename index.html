    <script>
      // Single Page App redirect restoration for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // If the 404.html page encoded a path into the query string (?p=...),
      // restore it via history.replaceState so React Router sees the correct URL.
      (function() {
        var redirect = new URLSearchParams(window.location.search).get('p');
        if (redirect) {
          window.history.replaceState(null, null, redirect);
        }
      })();
    </script>
