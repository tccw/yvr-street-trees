<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YVR Tree Map</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // When GitHub Pages can't find a file it serves this 404.html.
      // We encode the full URL into the query string and redirect to the
      // root so that index.html (and React Router) can restore the path.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
